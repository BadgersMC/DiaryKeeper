prefix: "&6[Diary] &r"

non-owner-edit: "&cYou can read this diary, but only the owner can edit it."
signing-disabled: "&eDiaries stay writable; signing is disabled."
ascii-only: "&cDiaries only allow standard English keyboard characters."
